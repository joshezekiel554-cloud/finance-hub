# tasks.feldart.com — the branded standalone Tasks front-door (shared-tasks M4).
# Set up 2026-06-25 over `ssh finance-vps` (certbot --nginx).
#
# It proxies to the co-tenant INBOX app (127.0.0.1:3002, same upstream as
# inbox.feldart.com). The inbox app serves a FINANCE-SKINNED standalone board at
# /t; the root→/t rewrite keys on `X-Forwarded-Host: tasks.feldart.com`, so this
# vhost MUST forward it (the `proxy_set_header X-Forwarded-Host $host` lines).
#
# Single sign-on: the inbox app's auth cookie is scoped to `.feldart.com` via
# `SESSION_COOKIE_DOMAIN=.feldart.com` set in the inbox WEB pm2 process env
# (NOT just .env.local — `next start` doesn't reliably read .env.local into
# process.env; use `pm2 restart feldart-inbox-web --update-env` + `pm2 save`).
# Setting it logs everyone out ONCE (cookie-name/domain change). After that, one
# sign-in carries across inbox.feldart.com + tasks.feldart.com + the finance
# embeds. AUTH_TRUST_HOST is set on the inbox app so Auth.js uses the request
# host; NEXTAUTH_URL stays https://inbox.feldart.com (no change needed).
#
# Google OAuth: the redirect URI `https://tasks.feldart.com/api/auth/callback/google`
# was added to the inbox Google OAuth client (388716855483-...apps.googleusercontent.com,
# GCP project #388716855483) alongside inbox's.

server {
    server_name tasks.feldart.com;
    client_max_body_size 30m;
    location ^~ /.well-known/acme-challenge/ { root /var/www/html; }
    location /api/sse {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding off;
    }
    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
    listen [::]:443 ssl; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/tasks.feldart.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/tasks.feldart.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}
server {
    if ($host = tasks.feldart.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot
    listen 80;
    listen [::]:80;
    server_name tasks.feldart.com;
    return 404; # managed by Certbot
}
