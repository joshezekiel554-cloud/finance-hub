# /etc/nginx/sites-available/finance.feldart.com
#
# Reverse proxy for the finance-hub Fastify app (port 3001).
# Mirrors the orders.feldart.com setup. After placing this file:
#
#   sudo ln -s /etc/nginx/sites-available/finance.feldart.com /etc/nginx/sites-enabled/
#   sudo nginx -t
#   sudo systemctl reload nginx
#   sudo certbot --nginx -d finance.feldart.com
#
# certbot --nginx will rewrite this file to add the SSL listener and
# managed certificate paths. Don't pre-configure SSL here.

server {
    listen 80;
    listen [::]:80;
    server_name finance.feldart.com;

    # certbot will inject the SSL listener + cert paths after first run.
    # Until then, plain HTTP for the ACME challenge.

    # Security headers (HSTS added by certbot for HTTPS)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Increase max upload size (file attachments, future)
    client_max_body_size 25M;

    # Reverse proxy to the Fastify app on port 3001
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;

        # Long-poll friendly timeouts (SSE notifications stream)
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Server-Sent Events endpoint needs no buffering and longer timeouts
    location ~ ^/api/(notifications/stream|agent/stream) {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        chunked_transfer_encoding on;
        proxy_read_timeout 24h;
        proxy_send_timeout 24h;
    }

    # Static asset caching (Vite-built assets have content hashes in the filename)
    location /assets/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
