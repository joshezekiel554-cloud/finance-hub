# Local dev only — production uses pm2 on the VPS (alongside orders.feldart.com),
# not Docker. The schema agent finalizes ports / volumes / app service.
# `docker compose up -d` brings up MySQL + Redis for local dev.
services:
  mysql:
    image: mysql:8
    container_name: finance-hub-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: feldart_root
      MYSQL_DATABASE: feldart_finance
      MYSQL_USER: feldart_app
      MYSQL_PASSWORD: feldart_app
    ports:
      - "3306:3306"
    volumes:
      - finance_hub_mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-uroot", "-pfeldart_root"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: finance-hub-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - finance_hub_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  finance_hub_mysql:
  finance_hub_redis:
